<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RClinVarbitration webR smoke test</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    pre { background: #f6f8fa; padding: 1rem; overflow: auto; white-space: pre-wrap; }
    button { padding: 0.6rem 1rem; }
  </style>
</head>
<body>
  <h1>RClinVarbitration webR smoke test</h1>
  <p>Installs the locally built webR package, loads its version-matched DuckDB side module, and imports the bundled compressed ClinVar fixture into relational DuckDB.</p>
  <button id="run">Run smoke test</button>
  <pre id="log">Idle</pre>

  <script type="module">
    import { WebR } from "https://webr.r-wasm.org/latest/webr.mjs";

    const button = document.getElementById("run");
    const logNode = document.getElementById("log");

    function log(text) {
      const line = typeof text === "string" ? text : safeText(text);
      logNode.textContent += line + "\n";
      console.log(line);
    }

    function safeText(value) {
      if (value == null) return "";
      if (typeof value === "string" || typeof value === "number" || typeof value === "boolean") return String(value);
      try {
        return JSON.stringify(value);
      } catch (_err) {
        return Object.prototype.toString.call(value);
      }
    }

    async function parseVersion() {
      const response = await fetch("/r/RClinVarbitration/DESCRIPTION", { cache: "no-store" });
      if (!response.ok) throw new Error(`Failed to fetch DESCRIPTION: ${response.status}`);
      const text = await response.text();
      const match = text.match(/^Version:\s*(.+)$/m);
      if (!match) throw new Error("Could not parse RClinVarbitration version");
      return match[1].trim();
    }

    async function capture(shelter, code) {
      log(`> ${code.split("\n")[0]}${code.includes("\n") ? " ..." : ""}`);
      const result = await shelter.captureR(code, {
        withAutoprint: true,
        captureStreams: true,
        captureConditions: true
      });
      for (const item of result.output) log(item.data ?? item.message ?? item);
      if (result.result?.type === "error") throw new Error(result.result.message);
      return result;
    }

    button.addEventListener("click", async () => {
      button.disabled = true;
      logNode.textContent = "";
      try {
        const version = await parseVersion();
        log(`RClinVarbitration version ${version}`);
        const webR = new WebR();
        await webR.init();
        const shelter = await new webR.Shelter();
        const repo = `${location.origin}/r/RClinVarbitration/webr-repo`;

        await capture(shelter, `options(webr_pkg_repos = c(RClinVarbitrationLocal = '${repo}', CRAN = 'https://repo.r-wasm.org/'))`);
        await capture(shelter, "webr::install(c('duckdb', 'RClinVarbitration'), repos = getOption('webr_pkg_repos'))");
        await capture(shelter, `
          library(DBI)
          library(duckdb)
          library(RClinVarbitration)
          fixture <- system.file('extdata', 'VCV_XML_VCV000091629.xml.gz', package = 'RClinVarbitration')
          stopifnot(nzchar(fixture), file.exists(fixture))
          con <- DBI::dbConnect(duckdb::duckdb(config = list(allow_unsigned_extensions = 'true')))
          stopifnot(DBI::dbGetQuery(con, 'SELECT 1 AS ok')$ok[[1]] == 1L)
          cat('DuckDB connection smoke: ok\\n')
        `);
        await capture(shelter, `
          rclinvarbitration_enable(con)
          rclinvarbitration_init(con)
          cat('DuckDB extension load smoke: ok\\n')
        `);
        await capture(shelter, `
          entities <- DBI::dbGetQuery(con, sprintf(
            "SELECT count(*) AS n FROM clinvar_xml_entities(%s)",
            as.character(DBI::dbQuoteString(con, fixture))
          ))$n[[1]]
          stopifnot(entities > 50L)
          counts <- rclinvarbitration_import_xml(con, fixture, release_id = 'webr-fixture')
          stopifnot(counts[['variants']] == 1, counts[['scv_assertions']] == 6)
          DBI::dbDisconnect(con, shutdown = TRUE)
          cat('DuckDB extension and XML import smoke: ok\\n')
        `);
        log("PASS");
      } catch (err) {
        log(`FAIL: ${err.message ?? String(err)}`);
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
