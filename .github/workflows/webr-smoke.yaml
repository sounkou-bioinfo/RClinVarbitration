name: webR-browser-smoke

"on":
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  webr-browser-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright browser
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Build wasm artifact and serve local smoke page
        run: |
          mkdir -p .webr-local-artifacts
          nohup scripts/start_webr_local_test.sh > .webr-local-artifacts/server.log 2>&1 &
          echo $! > .webr-local-artifacts/server.pid

      - name: Run browser smoke
        env:
          WEBR_SMOKE_URL: http://127.0.0.1:8000/scripts/webr-local-test.html
          WEBR_SMOKE_TIMEOUT_MS: '1200000'
        run: node scripts/run_webr_browser_smoke.mjs

      - name: Show webR server log on failure
        if: failure()
        run: |
          if [ -f .webr-local-artifacts/server.log ]; then
            cat .webr-local-artifacts/server.log
          fi

      - name: Stop local server
        if: always()
        run: |
          if [ -f .webr-local-artifacts/server.pid ]; then
            kill "$(cat .webr-local-artifacts/server.pid)" 2>/dev/null || true
          fi
